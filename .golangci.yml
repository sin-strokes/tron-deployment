linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic

linters-settings:
  goimports:
    local-prefixes: github.com/tronprotocol/tron-deployment
  errcheck:
    # Stdout/stderr writes never fail in any practical sense — checking
    # the return makes call sites noisy without catching real bugs.
    # Same for Close() on read-only file handles in defer position.
    # If a caller needs the error (rare), they assign and check explicitly.
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - fs.WalkDir
      - (io.Closer).Close
      - (*os.File).Close
      - (*os.File).Write
      - (*os.File).WriteString
      - (*os.File).Seek
      - os.Remove
      # `output.WriteJSON` writes to os.Stdout — same logic as fmt.Fprint*.
      - github.com/tronprotocol/tron-deployment/internal/output.WriteJSON
      # io.Copy in cmd/logs.go / cmd/exec.go streams stdout from a
      # container; the destination is os.Stdout which doesn't fail.
      - io.Copy
      # gzip / tar reader Close — defer cleanup; underlying stream
      # already done. `bytes.Buffer.Write` is also infallible.
      - (*compress/gzip.Reader).Close
      - (*compress/gzip.Writer).Close
      - (*archive/tar.Writer).Close
      - (*bytes.Buffer).Write
      # SSH session Close in defer — connection is dropping anyway.
      - (*golang.org/x/crypto/ssh.Session).Close
      # cmd/* lock & state save in defer / shutdown paths — caller is
      # already on the error/exit path; further wrapping adds noise.
      - (*github.com/tronprotocol/tron-deployment/internal/state.Lock).Release
  gocritic:
    # We keep the diagnostic tag (real bug-finders) but drop the style
    # tag wholesale. The style suggestions (paramTypeCombine,
    # sprintfQuotedString, unlambda, octalLiteral, filepathJoin, etc.)
    # are taste-level and have caused more PR noise than they've caught
    # bugs across this codebase.
    enabled-tags:
      - diagnostic
    disabled-checks:
      - hugeParam
      # filepathJoin diagnostic fires on hard-coded systemd unit
      # paths (/etc/systemd/system); that path is a Linux convention,
      # not a generic file-path-builder use.
      - filepathJoin

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # The state-lock store close-on-error path uses bare Close() in
    # error fast-paths; the real error is already being returned.
    - path: internal/state/.+\.go
      linters: [errcheck]
      text: "f\\.Close|l\\.file\\.Close"
    # Audit log defer Close on read paths is fine — write failures
    # surface as an explicit Sync()/Write() error elsewhere.
    - path: internal/security/audit\.go
      linters: [errcheck]
      text: "f\\.Close"
    # knowledge.Topics is best-effort directory walk; failure to
    # enumerate falls back to an empty list, which matches intent.
    - path: internal/knowledge/embed\.go
      linters: [errcheck]
      text: "fs\\.WalkDir"
    # Closer interfaces stored in a variable (not by type method) — the
    # errcheck exclude-functions pattern can't catch these because the
    # type isn't visible at the call site. Across cmd/* this is always
    # the resolveTarget()-returned target.Target, where Close() in
    # defer is purely cleanup of an SSH/local connection.
    - path: cmd/.+\.go
      linters: [errcheck]
      text: "(closer|c|t)\\.Close"
    # Same pattern propagated into internal/mcp's lifecycle tool: the
    # apply tool defers a target.Target Close on the SSH connection
    # path. Same justification as the cmd/* rule above.
    - path: internal/mcp/.+\.go
      linters: [errcheck]
      text: "(closer|c)\\.Close"
    # nc.SaveState / nc.Store.Save in cmd/* run on the post-action
    # cleanup path; the action itself already returned its result.
    # If the save itself fails, the worst case is a stale state.json,
    # which `trond doctor` surfaces and `trond apply` self-corrects.
    - path: cmd/.+\.go
      linters: [errcheck]
      text: "nc\\.(SaveState|Store\\.Save)"
    # Bootstrap diagnostic Exec calls capture stdout we don't read; the
    # exit code is checked separately.
    - path: cmd/bootstrap\.go
      linters: [errcheck]
      text: "tgt\\.Exec"
    # Status liveness probe defers Close on a target.Target whose type
    # is interface-resolved at runtime (jar vs SSH). errcheck can't
    # match it via type method, so a path rule covers it.
    - path: cmd/status\.go
      linters: [errcheck]
      text: "c\\.Close"
    # cmd/wait.go's TCP probe defer-closes a net.Conn; failure to close
    # an already-broken probe socket is irrelevant to the wait result.
    - path: cmd/wait\.go
      linters: [errcheck]
      text: "conn\\.Close"
    # Tests: relax style nags + write-on-buffer errcheck noise.
    - path: _test\.go
      linters: [errcheck, gocritic]
    # net.Listen() port-allocation Close — closure already discards
    # since we got the port number we wanted.
    - path: internal/intent/defaults\.go
      linters: [errcheck]
      text: "(l|udp)\\.Close"
    # allocateFreePorts always returns nil (errors are non-fatal,
    # callers fall back to default ports). Keeping the signature
    # error-returning leaves the door open for future changes.
    - path: internal/intent/defaults\.go
      linters: [unparam]
      text: "allocateFreePorts"

run:
  timeout: 5m
