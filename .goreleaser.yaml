version: 2

project_name: trond

before:
  hooks:
    - go mod tidy

builds:
  - id: trond
    main: .
    binary: trond
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tronprotocol/tron-deployment/cmd.version={{.Version}}
      - -X github.com/tronprotocol/tron-deployment/cmd.commit={{.Commit}}
      - -X github.com/tronprotocol/tron-deployment/cmd.buildTime={{.Date}}

  - id: replay
    main: ./tools/replay
    binary: replay
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    builds:
      - trond
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - examples/*
      - schemas/*

  - id: replay
    builds:
      - replay
    formats:
      - tar.gz
    name_template: "replay_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - src: tools/replay/README.md
        dst: README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Sign the checksums file (and therefore, transitively, every artifact
# whose hash is listed in it) with cosign keyless OIDC. The release
# workflow installs cosign and runs against the GitHub OIDC token so no
# long-lived signing key needs to be stored. Verify locally with:
#   cosign verify-blob \
#     --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp '.+@github\.com' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Linux package formats — gives ops teams a real `apt install trond` /
# `dnf install trond` story instead of "download a tarball".
nfpms:
  - id: trond-pkg
    package_name: trond
    vendor: TRON Foundation
    homepage: https://github.com/tronprotocol/tron-deployment
    maintainer: TRON Deployment Maintainers <opensource@tron.network>
    description: |-
      CLI for declarative TRON node deployment, lifecycle, and diagnostics.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    section: net
    contents:
      - src: examples/
        dst: /usr/share/trond/examples
      - src: schemas/intent.schema.json
        dst: /usr/share/trond/schemas/intent.schema.json
      - src: LICENSE
        dst: /usr/share/doc/trond/LICENSE
        file_info:
          mode: 0644

# Homebrew tap so `brew install tronprotocol/tap/trond` works on macOS
# and Linuxbrew. Requires the GitHub user to maintain a `homebrew-tap`
# repo under the same org; goreleaser bumps the formula automatically
# on every release.
#
# TODO: goreleaser is phasing out `brews` in favor of `homebrew_casks`.
# Casks are traditionally for GUI/.app installs but Homebrew has been
# pushing CLI tools through them too. Migration changes the user-facing
# install command from `brew install` to `brew install --cask` and
# requires retesting against Linuxbrew. Hold until goreleaser actually
# removes brews — it's been "phasing out" for >1 year and the formula
# path is still the cleaner UX for CLI tools.
brews:
  - name: trond
    repository:
      owner: tronprotocol
      name: homebrew-tap
      branch: main
    homepage: https://github.com/tronprotocol/tron-deployment
    description: CLI for declarative TRON node deployment
    license: MIT
    test: |
      system "#{bin}/trond version"
    install: |
      bin.install "trond"
      generate_completions_from_executable(bin/"trond", "completion")

# Docker image — useful for CI runners and one-off "exec into a trond"
# scenarios. The dockers_v2 block replaced the older `dockers` +
# `docker_manifests` pair: it builds a single multi-arch manifest in
# one pass instead of two per-arch builds plus a manual manifest fan-in.
# `platforms` enumerates the targets; goreleaser fans out to buildx.
dockers_v2:
  - id: trond
    images:
      - "tronprotocol/trond"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile.release
    labels:
      org.opencontainers.image.source: "https://github.com/tronprotocol/tron-deployment"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

release:
  github:
    owner: tronprotocol
    name: tron-deployment
  draft: false
  prerelease: auto
