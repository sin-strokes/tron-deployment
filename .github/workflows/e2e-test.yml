name: E2E Test

# E2E runs are slow (real Docker, real java-tron containers, real network
# connections) so we keep them on the heavier branch + tag schedule. The
# fast feedback (lint, unit, vuln) lives in ci.yml.

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build trond
        run: make build

      - name: Validate example intents
        run: |
          for f in examples/*.yaml; do
            ./bin/trond config validate "$f" --output json
          done

      - name: Run e2e tests
        run: make e2e
