name: E2E Test

on:
  push:
    branches: [master, "001-*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build trond
        run: make build

      - name: Validate example intents
        run: |
          for f in examples/*.yaml; do
            ./bin/trond config validate "$f" --output json
          done

      - name: Run unit tests
        run: make test

      - name: Run e2e tests
        run: make e2e
