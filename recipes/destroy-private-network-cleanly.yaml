name: destroy-private-network-cleanly
description: |
  Tear down a multi-node private network created via `trond network
  create`. Stops every node, then runs network destroy with the
  --confirm gate. The status-check step runs first and is informational
  only (its on_failure is "continue" so a missing network doesn't
  abort the recipe — but the destroy step that follows WILL fail with
  NETWORK_NOT_FOUND if there's nothing to destroy, which is the right
  signal that the recipe was called against the wrong name).

  Use this for clean test cleanup. To destroy WITHOUT failing on
  already-destroyed networks (e.g., from CI cleanup hooks), call
  `trond network destroy --confirm <name>` directly and ignore exit 1.

params:
  - name: network
    type: string
    required: true
    description: |
      Name of the private network (matches the intent's name field
      that was used with `trond network create`).

steps:
  - id: status-check
    description: |
      Confirm the network exists. on_failure=continue so an
      already-destroyed network just falls through to the destroy
      step (which itself is idempotent).
    command: network status
    args:
      - "{{ params.network }}"
    on_failure: continue

  - id: destroy
    description: |
      Stop every node, remove containers, drop docker volumes. The
      --confirm value MUST match the network name (typo guard).
    command: network destroy
    args:
      - "{{ params.network }}"
      - --confirm
      - "{{ params.network }}"
    on_failure: abort
