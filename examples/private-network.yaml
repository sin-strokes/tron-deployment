# Deploy a private development network with one witness and one fullnode
# Usage: SR_PRIVATE_KEY=<key> trond network create --intent examples/private-network.yaml
name: private-dev

target:
  type: local
  runtime: docker

network: private

nodes:
  - type: witness
    version: latest
    witness_key:
      private_key_env: SR_PRIVATE_KEY
    features:
      metrics: true
    resources:
      memory: 8GB
    ports:
      http: 8090
      grpc: 50051
      p2p: 18888

  - type: fullnode
    version: latest
    features:
      jsonrpc: true
      metrics: true
    resources:
      memory: 8GB
    ports:
      http: 8091
      grpc: 50052
      jsonrpc: 8545
      p2p: 18889
